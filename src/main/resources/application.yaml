spring:
  application:
    name: TCC-Gym-Admin

  datasource:
    url: jdbc:postgresql://localhost:5432/tcc_gym_admin
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true